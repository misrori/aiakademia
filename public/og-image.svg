<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="130" x2="800" y2="630"/>
    <line x1="0" y1="330" x2="600" y2="630"/>
  </g>
  <!-- Brain/network icon -->
  <circle cx="250" cy="315" r="100" fill="none" stroke="url(#accent)" stroke-width="5"/>
  <circle cx="250" cy="315" r="60" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
  <circle cx="250" cy="315" r="24" fill="url(#accent)" opacity="0.8"/>
  <!-- Connection nodes -->
  <circle cx="168" cy="260" r="8" fill="#06b6d4"/>
  <circle cx="332" cy="260" r="8" fill="#06b6d4"/>
  <circle cx="168" cy="370" r="8" fill="#06b6d4"/>
  <circle cx="332" cy="370" r="8" fill="#06b6d4"/>
  <circle cx="250" cy="222" r="8" fill="#22d3ee"/>
  <circle cx="250" cy="408" r="8" fill="#22d3ee"/>
  <line x1="168" y1="260" x2="250" y2="222" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="332" y1="260" x2="250" y2="222" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="168" y1="370" x2="250" y2="408" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="332" y1="370" x2="250" y2="408" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <!-- Title text -->
  <text x="480" y="260" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="white" letter-spacing="2">AI Akadémia</text>
  <!-- Subtitle -->
  <text x="480" y="330" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="32" fill="#94a3b8">Ötletből saját domaines weboldal</text>
  <!-- Tags -->
  <rect x="480" y="370" width="140" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
  <text x="550" y="394" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#06b6d4">Lovable</text>
  <rect x="636" y="370" width="130" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
  <text x="701" y="394" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#06b6d4">GitHub</text>
  <rect x="782" y="370" width="80" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
  <text x="822" y="394" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#06b6d4">DNS</text>
  <rect x="878" y="370" width="120" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
  <text x="938" y="394" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#06b6d4">Actions</text>
