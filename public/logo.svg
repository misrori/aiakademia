<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Brain/circuit motif -->
  <circle cx="256" cy="200" r="80" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <circle cx="256" cy="200" r="50" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="200" r="20" fill="url(#accent)" opacity="0.8"/>
  <!-- Connection nodes -->
  <circle cx="190" cy="155" r="8" fill="#06b6d4"/>
  <circle cx="322" cy="155" r="8" fill="#06b6d4"/>
  <circle cx="190" cy="245" r="8" fill="#06b6d4"/>
  <circle cx="322" cy="245" r="8" fill="#06b6d4"/>
  <circle cx="256" cy="128" r="8" fill="#22d3ee"/>
  <circle cx="256" cy="272" r="8" fill="#22d3ee"/>
  <!-- Connection lines -->
  <line x1="190" y1="155" x2="256" y2="128" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="322" y1="155" x2="256" y2="128" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="190" y1="245" x2="256" y2="272" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="322" y1="245" x2="256" y2="272" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="52" fill="white" letter-spacing="2">AI</text>
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="36" fill="#06b6d4" letter-spacing="4">AKADÉMIA</text>
</svg>
